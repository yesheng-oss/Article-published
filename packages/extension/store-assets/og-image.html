<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OG Image - 1200x630</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    .og-image {
      width: 1200px;
      height: 630px;
      background: linear-gradient(180deg, #f5f0fa 0%, #eef8fb 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .og-image .title {
      font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', Georgia, serif;
      font-size: 38px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      text-align: center;
    }
    .og-image .subtitle {
      font-size: 18px;
      color: #666;
      margin-bottom: 20px;
    }
    .og-image .mockup {
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }
    .browser-window {
      background: white;
      border-radius: 10px;
      box-shadow: 0 16px 60px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .browser-header {
      height: 40px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 7px;
    }
    .browser-dot { width: 10px; height: 10px; border-radius: 50%; }
    .browser-dot.red { background: #ff5f57; }
    .browser-dot.yellow { background: #ffbd2e; }
    .browser-dot.green { background: #28c840; }
    .browser-url {
      flex: 1;
      height: 24px;
      background: white;
      border-radius: 5px;
      margin-left: 10px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 11px;
      color: #666;
    }
    .browser-content {
      padding: 20px;
      background: #fafafa;
    }
    .browser-tabs {
      display: flex;
      gap: 5px;
      padding: 8px 14px;
      background: #f9fafb;
      border-top: 1px solid #f0f0f0;
      flex-wrap: wrap;
    }
    .browser-tabs span {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 16px;
      font-weight: 500;
    }
    .popup-mockup {
      width: 320px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .popup-header {
      background: linear-gradient(135deg, #6b5dae 0%, #3aaed1 100%);
      padding: 16px;
      color: white;
    }
    .popup-header h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .popup-header p { font-size: 11px; opacity: 0.85; }
    .popup-platforms { padding: 12px 16px; }
    .popup-platform {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .popup-platform.selected {
      background: #edf8fc;
      border: 2px solid #3aaed1;
    }
    .popup-platform-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: contain;
    }
    .popup-platform-name { flex: 1; font-size: 13px; font-weight: 500; }
    .popup-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3aaed1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .popup-btn {
      margin: 12px 16px 16px;
      background: linear-gradient(135deg, #6b5dae 0%, #3aaed1 100%);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      width: calc(100% - 32px);
    }
  </style>
</head>
<body>
  <div class="section-title" style="font-size: 14px; color: #666; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #ddd;">OG Image (1200×630) - 基于 screenshot-1</div>
  <div class="og-image" id="og-image">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
      <svg width="40" height="40" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12,8 L8,8 C5.790861,8 4,9.790861 4,12 L4,13 C4,14.6568542 5.34314575,16 7,16 L7,18 C4.23857625,18 2,15.7614237 2,13 L2,12 C2,8.6862915 4.6862915,6 8,6 L12,6 L12,4.72799742 C12,4.62015048 12.0348702,4.51519416 12.0994077,4.42878885 C12.264656,4.2075478 12.5779675,4.16215674 12.7992086,4.32740507 L15.656242,6.46136716 C15.6951359,6.49041758 15.7295917,6.52497737 15.7585249,6.56395854 C15.9231063,6.78569617 15.876772,7.09886961 15.6550344,7.263451 L12.798001,9.3840407 C12.7118152,9.44801079 12.607332,9.48254921 12.5,9.48254921 C12.2238576,9.48254921 12,9.25869158 12,8.98254921 L12,8 Z" fill="#6b5dae"/>
        <path d="M12.0583175,16 L16,16 C18.209139,16 20,14.209139 20,12 L20,11 C20,9.34314575 18.6568542,8 17,8 L17,6 C19.7614237,6 22,8.23857625 22,11 L22,12 C22,15.3137085 19.3137085,18 16,18 L12.0583175,18 L12.0583175,18.9825492 C12.0583175,19.2586916 11.8344599,19.4825492 11.5583175,19.4825492 C11.4509855,19.4825492 11.3465023,19.4480108 11.2603165,19.3840407 L8.40328311,17.263451 C8.18154548,17.0988696 8.13521119,16.7856962 8.29979258,16.5639585 C8.32872576,16.5249774 8.36318164,16.4904176 8.40207551,16.4613672 L11.2591089,14.3274051 C11.48035,14.1621567 11.7936615,14.2075478 11.9589099,14.4287888 C12.0234473,14.5151942 12.0583175,14.6201505 12.0583175,14.7279974 L12.0583175,16 Z" fill="#3aaed1"/>
      </svg>
      <span style="font-size: 20px; font-weight: 600; color: #333;">文章同步助手</span>
    </div>
    <div class="title">一键同步，效率翻倍</div>
    <div class="subtitle">浏览器扩展 · CLI · MCP · OpenClaw — 多入口同步到 29+ 平台</div>
    <div class="mockup">
      <div class="browser-window" style="width: 580px;">
        <div class="browser-header">
          <div class="browser-dot red"></div>
          <div class="browser-dot yellow"></div>
          <div class="browser-dot green"></div>
          <div class="browser-url">mp.weixin.qq.com/cgi-bin/appmsg</div>
        </div>
        <div class="browser-content" style="height: 240px; display: flex; align-items: center; justify-content: center;">
          <div style="text-align: center; color: #999;">
            <svg width="64" height="64" fill="#6b5dae" viewBox="0 0 24 24" style="margin-bottom: 12px;"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
            <div style="font-size: 16px; color: #333;">微信公众号编辑器</div>
            <div style="font-size: 12px; margin-top: 6px;">在此编辑您的文章...</div>
          </div>
        </div>
        <div class="browser-tabs">
          <span style="background: #6b5dae; color: white;">公众号编辑器</span>
          <span style="background: rgba(0,0,0,0.06); color: #666;">文章阅读页</span>
          <span style="background: rgba(0,0,0,0.06); color: #666;">CLI 命令行</span>
          <span style="background: rgba(0,0,0,0.06); color: #666;">Claude AI</span>
          <span style="background: rgba(0,0,0,0.06); color: #666;">Markdown</span>
          <span style="background: rgba(0,0,0,0.06); color: #666;">OpenClaw</span>
        </div>
      </div>
      <div class="popup-mockup">
        <div class="popup-header">
          <h3>文章同步助手</h3>
          <p>选择要同步的平台</p>
        </div>
        <div class="popup-platforms">
          <div class="popup-platform selected">
            <img class="popup-platform-icon" src="https://www.wechatsync.com/images/zhihu.png" alt="知乎">
            <div class="popup-platform-name">知乎</div>
            <div class="popup-check">
              <svg width="10" height="10" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
          </div>
          <div class="popup-platform selected">
            <img class="popup-platform-icon" src="https://www.wechatsync.com/images/juejin.png" alt="掘金">
            <div class="popup-platform-name">掘金</div>
            <div class="popup-check">
              <svg width="10" height="10" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
          </div>
          <div class="popup-platform">
            <img class="popup-platform-icon" src="https://www.wechatsync.com/images/csdn.png" alt="CSDN">
            <div class="popup-platform-name">CSDN</div>
          </div>
          <div class="popup-platform">
            <img class="popup-platform-icon" src="https://www.wechatsync.com/images/toutiao.png" alt="头条号">
            <div class="popup-platform-name">头条号</div>
          </div>
        </div>
        <button class="popup-btn">同步到 2 个平台</button>
      </div>
    </div>
  </div>
</body>
</html>
